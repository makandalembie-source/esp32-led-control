<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ESP32 - Contrôle LED</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }

        /* Cartes compactes et bien rangées */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px 18px;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 1.8em;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        h2 {
            color: white;
            text-align: center;
            margin-bottom: 18px;
            font-size: 1.3rem;
            font-weight: 500;
        }

        /* Groupe IP - alignement parfait sur mobile */
        .ip-group {
            display: flex;
            gap: 12px;
            flex-wrap: nowrap;
            margin-bottom: 16px;
        }

        @media (max-width: 450px) {
            .ip-group {
                flex-wrap: wrap;
            }
            .ip-group input {
                width: 100%;
            }
            .ip-group button {
                width: 100%;
            }
        }

        input {
            flex: 1;
            padding: 14px 16px;
            border: none;
            border-radius: 18px;
            background: #1a1a2e;
            color: white;
            font-size: 16px;
            border: 1px solid #333;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 0 2px rgba(0,255,136,0.2);
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
            font-size: 15px;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: #00ff88;
            color: #1a1a2e;
            font-weight: bold;
        }

        /* Boutons ON/OFF - parfaitement alignés */
        .button-group {
            display: flex;
            gap: 16px;
            margin: 20px 0 12px;
            flex-direction: row;
        }

        @media (max-width: 400px) {
            .button-group {
                gap: 12px;
            }
        }

        .btn-on {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #1a1a2e;
            font-size: 20px;
            padding: 18px 12px;
            flex: 1;
            font-weight: bold;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 6px 14px rgba(0,255,136,0.3);
        }

        .btn-off {
            background: linear-gradient(135deg, #ff4757, #cc2b3b);
            color: white;
            font-size: 20px;
            padding: 18px 12px;
            flex: 1;
            font-weight: bold;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 6px 14px rgba(255,71,87,0.3);
        }

        /* LED - centrée et stable */
        .led-container {
            text-align: center;
            margin-bottom: 8px;
        }

        .led {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 12px;
            transition: all 0.2s ease;
            background: #2a2a3e;
        }

        .led-on {
            background: radial-gradient(circle at 35% 35%, #ff5e5e, #cc1111);
            box-shadow: 0 0 28px #ff4444, 0 0 8px #ff8888;
            animation: gentlePulse 1.2s infinite alternate;
        }

        @keyframes gentlePulse {
            0% { box-shadow: 0 0 12px #ff3a3a, 0 0 4px #ff8888; }
            100% { box-shadow: 0 0 32px #ff6666, 0 0 16px #ffaaaa; }
        }

        .led-off {
            background: radial-gradient(circle at 35% 35%, #3a3a55, #1a1a2a);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }

        .led-text {
            color: #ddd;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        /* Status et infos - bien organisées */
        .status-text {
            margin-top: 12px;
            text-align: center;
            font-size: 0.8rem;
            padding: 10px 12px;
            border-radius: 40px;
            font-weight: 500;
            word-break: break-word;
        }

        .status-text.success {
            color: #a0ffa0;
            background: rgba(0, 255, 100, 0.12);
        }

        .status-text.error {
            color: #ffa0a0;
            background: rgba(255, 50, 50, 0.12);
        }

        .status-text.info {
            color: #bbbbff;
            background: rgba(100, 100, 255, 0.1);
        }

        .info {
            text-align: center;
            color: #aaaad0;
            font-size: 0.72rem;
            margin-top: 12px;
            background: rgba(0,0,0,0.25);
            padding: 8px 12px;
            border-radius: 40px;
            word-break: break-word;
        }

        .footer {
            text-align: center;
            color: #777;
            font-size: 0.65rem;
            margin-top: 8px;
            padding: 0 10px;
        }

        #espIpDisplay {
            font-weight: 600;
            color: #ccddff;
            background: #00000040;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            font-size: 0.75rem;
        }

        /* Aucun élément ne dépasse, tout reste propre */
        .container, .card, .button-group, .ip-group {
            overflow-x: hidden;
        }

        button {
            touch-action: manipulation;
        }

        /* Suppression des scrolls horizontaux indésirables */
        body {
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💡 ESP32 LED Control</h1>
        <div class="subtitle">Contrôle à distance via WiFi</div>

        <!-- Section connexion -->
        <div class="card">
            <h2>🔌 Connexion</h2>
            <div class="ip-group">
                <input type="text" id="ipInput" placeholder="192.168.1.XX" autocomplete="off" inputmode="decimal">
                <button id="connectBtn" class="btn btn-primary">Connecter</button>
            </div>
            <div id="connectionStatus" class="status-text"></div>
        </div>

        <!-- Section contrôle - TOUJOURS VISIBLE et bien rangée -->
        <div id="controlPanel" class="card">
            <h2>🎮 Contrôle LED</h2>
            
            <div class="led-container">
                <div id="ledVisual" class="led led-off"></div>
                <div id="ledText" class="led-text">⚪ ÉTEINTE</div>
            </div>

            <div class="button-group">
                <button id="onBtn" class="btn-on">🟢 ALLUMER</button>
                <button id="offBtn" class="btn-off">🔴 ÉTEINDRE</button>
            </div>

            <div class="info">
                <span id="espIpDisplay"></span>
            </div>
        </div>

        <div class="footer">
            Assurez-vous que l'ESP32 est alimenté et sur le même réseau WiFi
        </div>
    </div>

    <script>
        // Éléments DOM
        const ipInput = document.getElementById('ipInput');
        const connectBtn = document.getElementById('connectBtn');
        const connectionStatus = document.getElementById('connectionStatus');
        const onBtn = document.getElementById('onBtn');
        const offBtn = document.getElementById('offBtn');
        const ledVisual = document.getElementById('ledVisual');
        const ledText = document.getElementById('ledText');
        const espIpDisplay = document.getElementById('espIpDisplay');

        let espIP = '';
        let intervalVerification = null;
        let connectionActive = false;
        let retryCount = 0;

        function setStatus(message, type) {
            connectionStatus.textContent = message;
            connectionStatus.className = 'status-text ' + type;
            // Auto-effacement des messages de succès après 2.5s sauf si connexion active stable
            if (type === 'success') {
                setTimeout(() => {
                    if (connectionStatus.textContent === message && connectionActive && espIP) {
                        connectionStatus.textContent = '✅ Connecté et synchronisé';
                        connectionStatus.className = 'status-text success';
                    } else if (connectionStatus.textContent === message && !connectionActive) {
                        // ne pas écraser les erreurs
                    }
                }, 2500);
            }
        }

        function updateLedDisplay(isOn) {
            if (isOn) {
                ledVisual.className = 'led led-on';
                ledText.innerHTML = '🔴 ALLUMÉE';
                ledText.style.color = '#ff9999';
            } else {
                ledVisual.className = 'led led-off';
                ledText.innerHTML = '⚪ ÉTEINTE';
                ledText.style.color = '#ccc';
            }
        }

        async function checkLedStatus() {
            if (!espIP) return false;
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                const response = await fetch(`http://${espIP}/statut`, {
                    signal: controller.signal,
                    cache: 'no-store'
                });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const status = await response.text();
                    const isOn = (status.trim().toUpperCase() === 'ON');
                    updateLedDisplay(isOn);
                    
                    if (!connectionActive) {
                        connectionActive = true;
                        retryCount = 0;
                        setStatus(`✅ Connecté à ${espIP}`, 'success');
                        espIpDisplay.textContent = `ESP32 : ${espIP}  🟢`;
                    }
                    return isOn;
                } else {
                    throw new Error('Invalid response');
                }
            } catch (error) {
                if (connectionActive) {
                    retryCount++;
                    if (retryCount >= 2) {
                        connectionActive = false;
                        setStatus(`⚠️ Perte de connexion avec ${espIP}`, 'error');
                        espIpDisplay.textContent = `📡 ${espIP} (hors ligne)`;
                        // On ne change pas l'affichage LED pour garder dernier état connu
                    } else {
                        setStatus(`🔄 Reconnexion... (${retryCount}/2)`, 'info');
                    }
                }
                return false;
            }
        }

        async function sendCommand(action) {
            if (!espIP) {
                setStatus('Connectez-vous d\'abord à l\'ESP32', 'error');
                return false;
            }
            
            if (!connectionActive) {
                setStatus(`📡 Tentative de réveil de l'ESP...`, 'info');
                const pingOk = await checkLedStatus();
                if (!pingOk) {
                    setStatus(`❌ ESP non joignable, vérifiez l'adresse IP`, 'error');
                    return false;
                }
            }
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                const response = await fetch(`http://${espIP}/${action}`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    setStatus(`Commande ${action === 'allumer' ? 'ALLUMER' : 'ÉTEINDRE'} envoyée ✅`, 'success');
                    // Rafraîchir l'état après un court délai
                    setTimeout(() => checkLedStatus(), 100);
                    return true;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                setStatus(`Erreur: ESP32 non joignable`, 'error');
                connectionActive = false;
                espIpDisplay.textContent = `⚠️ ${espIP} (indisponible)`;
                return false;
            }
        }

        async function connectToESP() {
            const ip = ipInput.value.trim();
            if (!ip) {
                setStatus('Entrez une adresse IP valide', 'error');
                return;
            }
            
            // Validation IP simple
            const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
            if (!ipRegex.test(ip)) {
                setStatus('Format IP invalide (ex: 192.168.1.100)', 'error');
                return;
            }

            // Nettoyer ancien intervalle
            if (intervalVerification) {
                clearInterval(intervalVerification);
                intervalVerification = null;
            }
            
            setStatus(`Connexion à ${ip}...`, 'info');
            espIP = ip;
            connectionActive = false;
            retryCount = 0;
            espIpDisplay.textContent = `🔄 ${ip} (connexion...)`;
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2500);
                const response = await fetch(`http://${ip}/statut`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const statusText = await response.text();
                    const isOn = (statusText.trim().toUpperCase() === 'ON');
                    updateLedDisplay(isOn);
                    connectionActive = true;
                    setStatus(`✅ Connecté à ${ip}`, 'success');
                    espIpDisplay.textContent = `ESP32 : ${ip}  🟢`;
                    
                    // Lancer la vérification périodique
                    intervalVerification = setInterval(() => {
                        if (espIP) {
                            checkLedStatus();
                        }
                    }, 2000);
                } else {
                    throw new Error();
                }
            } catch (error) {
                setStatus(`❌ Impossible de joindre ${ip}`, 'error');
                espIP = '';
                connectionActive = false;
                espIpDisplay.textContent = '';
                updateLedDisplay(false);
                if (intervalVerification) {
                    clearInterval(intervalVerification);
                    intervalVerification = null;
                }
            }
        }

        // Événements avec gestion tactile améliorée
        connectBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (intervalVerification) {
                clearInterval(intervalVerification);
                intervalVerification = null;
            }
            connectToESP();
        });
        
        onBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            if (!espIP) {
                setStatus('Connectez-vous d\'abord (bouton Connecter)', 'error');
                return;
            }
            await sendCommand('allumer');
        });
        
        offBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            if (!espIP) {
                setStatus('Connectez-vous d\'abord (bouton Connecter)', 'error');
                return;
            }
            await sendCommand('eteindre');
        });
        
        ipInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (intervalVerification) {
                    clearInterval(intervalVerification);
                    intervalVerification = null;
                }
                connectToESP();
            }
        });
        
        // Petit effet de retour haptique sur mobile (si supporté, optionnel)
        if (window.navigator && window.navigator.vibrate) {
            const addVibration = (btn) => {
                btn.addEventListener('touchstart', () => {
                    window.navigator.vibrate(10);
                });
            };
            addVibration(connectBtn);
            addVibration(onBtn);
            addVibration(offBtn);
        }
        
        // Nettoyage lors de la fermeture / changement de page
        window.addEventListener('beforeunload', () => {
            if (intervalVerification) clearInterval(intervalVerification);
        });
        
        // Message d'accueil élégant
        setStatus('Prêt • Entrez l\'IP de votre ESP32', 'info');
        
        // Correction supplémentaire pour éviter tout débordement horizontal
        const fixMobileOverflow = () => {
            const container = document.querySelector('.container');
            if (container && window.innerWidth < 480) {
                container.style.paddingLeft = '0px';
                container.style.paddingRight = '0px';
            }
        };
        window.addEventListener('resize', fixMobileOverflow);
        fixMobileOverflow();
    </script>
</body>
</html>
